<section>
  <app-page-header
    title="Students"
    subtitle="Register new students. Profiles open after registration; list and search arrive in Milestone 8."
  >
    <app-button variant="primary" type="button" (pressed)="goToRegister()">Add student</app-button>

  />
</section>
