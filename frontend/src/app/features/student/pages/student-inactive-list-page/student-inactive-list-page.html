<section class="student-inactive-list">
  <app-page-header
    title="Archived students"
    subtitle="Historical records. View profiles and documents; administrators can restore."
  >
    <app-button variant="secondary" [routerLink]="paths.students">
      Active students
    </app-button>
  </app-page-header>

  @if (!loading() && loadFailed()) {
    <app-empty-state
      title="Unable to load archived students"
      description="Something went wrong while loading archived students. Please try again."
    >
      <app-button type="button" variant="primary" size="sm" (pressed)="loadStudents()">
        Retry
      </app-button>
    </app-empty-state>
  } @else if (!loading() && students().length === 0) {
    <app-empty-state
      title="No archived students"
      description="Archived students will appear here after they are soft-deleted from the active list."
    />
  } @else {
    <div
      class="student-inactive-list__grid ag-theme-quartz"
      [class.student-inactive-list__grid--loading]="loading()"
    >
      <ag-grid-angular
        style="width: 100%; height: 100%;"
        theme="legacy"
        [rowData]="students()"
        [columnDefs]="columnDefs"
        [defaultColDef]="defaultColDef"
        [context]="gridContext"
        [suppressCellFocus]="true"
        (gridReady)="onGridReady($event)"
        (sortChanged)="onSortChanged($event)"
      />
    </div>

    <div class="student-inactive-list__pager">
      <span class="student-inactive-list__pager-meta">
        {{ totalElements() }} archived student{{ totalElements() === 1 ? '' : 's' }}
        · Page {{ page() + 1 }} of {{ totalPages() || 1 }}
      </span>
      <div class="student-inactive-list__pager-actions">
        <app-button
          type="button"
          variant="secondary"
          size="sm"
          [disabled]="page() === 0 || loading()"
          (pressed)="prevPage()"
        >
          Previous
        </app-button>
        <app-button
          type="button"
          variant="secondary"
          size="sm"
          [disabled]="(page() + 1) * pageSize() >= totalElements() || loading()"
          (pressed)="nextPage()"
        >
          Next
        </app-button>
      </div>
    </div>
  }
</section>
