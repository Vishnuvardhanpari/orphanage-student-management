<app-dialog-shell ariaLabel="Archive student" size="lg">
  <h2 dialogTitle>Archive student</h2>
  <p class="archive-dialog__message">
    Archive {{ data.studentName }} ({{ data.admissionNumber }})? The record will move to
    Archived Students and can be restored by an administrator. You can optionally record
    exit details below.
  </p>

  <form
    class="archive-dialog__form"
    [formGroup]="form"
  >
    <app-field label="Exit date (optional)">
      <app-input
        type="date"
        formControlName="exitDate"
        [max]="today"
        [min]="data.admissionDate"
      />
    </app-field>
    <app-field label="Exit reason (optional)">
      <app-input
        type="text"
        formControlName="exitReason"
        placeholder="e.g. Family relocated"
      />
    </app-field>
    <app-field label="Exit remarks (optional)">
      <app-textarea
        formControlName="exitRemarks"
        [rows]="3"
        placeholder="Additional notes"
      />
    </app-field>

    @if (error()) {
      <p class="archive-dialog__error" role="alert">{{ error() }}</p>
    }
  </form>

  <div dialogActions>
    <app-button type="button" variant="secondary" (pressed)="cancel()">Cancel</app-button>
    <app-button type="button" variant="danger" (pressed)="confirm()">Archive</app-button>
  </div>
</app-dialog-shell>
