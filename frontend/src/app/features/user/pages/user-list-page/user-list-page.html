<section class="user-list">
  <app-page-header title="Users" subtitle="Manage staff and administrator accounts.">
    <a [routerLink]="[paths.users, 'new']">
      <app-button variant="primary">Add user</app-button>
    </a>
  </app-page-header>

  <form class="user-list__filters" [formGroup]="filterForm" (ngSubmit)="applyFilters()">
    <label class="user-list__field">
      <span>Search</span>
      <input
        type="search"
        formControlName="search"
        placeholder="Username or email"
        class="user-list__input"
      />
    </label>
    <label class="user-list__field">
      <span>Role</span>
      <select formControlName="role" class="user-list__input">
        <option value="">All</option>
        <option value="ADMIN">Admin</option>
        <option value="STAFF">Staff</option>
      </select>
    </label>
    <label class="user-list__field">
      <span>Status</span>
      <select formControlName="enabled" class="user-list__input">
        <option value="">All</option>
        <option value="true">Enabled</option>
        <option value="false">Disabled</option>
      </select>
    </label>
    <div class="user-list__filter-actions">
      <app-button type="submit" variant="primary" size="sm">Apply</app-button>
      <app-button type="button" variant="secondary" size="sm" (pressed)="clearFilters()">
        Clear
      </app-button>
    </div>
  </form>

  @if (!loading() && users().length === 0) {
    <app-empty-state
      title="No users found"
      description="Try adjusting filters or create a new staff account."
    />
  } @else {
    <div class="user-list__grid ag-theme-quartz" [class.user-list__grid--loading]="loading()">
      <ag-grid-angular
        style="width: 100%; height: 100%;"
        [rowData]="users()"
        [columnDefs]="columnDefs"
        [defaultColDef]="defaultColDef"
        [suppressCellFocus]="true"
        (gridReady)="onGridReady($event)"
      />
    </div>

    <div class="user-list__pager">
      <span class="user-list__pager-meta">
        {{ totalElements() }} user{{ totalElements() === 1 ? '' : 's' }} · Page {{ page() + 1 }}
      </span>
      <div class="user-list__pager-actions">
        <app-button
          type="button"
          variant="secondary"
          size="sm"
          [disabled]="page() === 0 || loading()"
          (pressed)="prevPage()"
        >
          Previous
        </app-button>
        <app-button
          type="button"
          variant="secondary"
          size="sm"
          [disabled]="(page() + 1) * pageSize() >= totalElements() || loading()"
          (pressed)="nextPage()"
        >
          Next
        </app-button>
      </div>
    </div>
  }
</section>
