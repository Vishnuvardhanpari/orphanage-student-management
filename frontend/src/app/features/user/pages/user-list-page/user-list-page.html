<section class="user-list oms-page">
  <app-page-header title="Users" subtitle="Manage staff and administrator accounts.">
    <app-button variant="primary" [routerLink]="[paths.users, 'new']">Add user</app-button>
  </app-page-header>

  <form [formGroup]="filterForm" (ngSubmit)="applyFilters()">
    <app-filter-panel ariaLabel="User filters" columns="3">
      <app-field label="Search">
        <app-input type="search" formControlName="search" placeholder="Username or email" />
      </app-field>
      <app-field label="Role">
        <app-select formControlName="role">
          <option value="">All</option>
          <option value="ADMIN">Admin</option>
          <option value="STAFF">Staff</option>
        </app-select>
      </app-field>
      <app-field label="Status">
        <app-select formControlName="enabled">
          <option value="">All</option>
          <option value="true">Enabled</option>
          <option value="false">Disabled</option>
        </app-select>
      </app-field>
      <div class="user-list__filter-actions">
        <app-button type="submit" variant="primary" size="sm">Apply</app-button>
        <app-button type="button" variant="secondary" size="sm" (pressed)="clearFilters()">
          Clear
        </app-button>
      </div>
    </app-filter-panel>
  </form>

  @if (!loading() && loadFailed()) {
    <app-empty-state
      variant="error"
      title="Unable to load users"
      description="Something went wrong while loading the user list. Please try again."
    >
      <app-button type="button" variant="primary" size="sm" (pressed)="loadUsers()">
        Retry
      </app-button>
    </app-empty-state>
  } @else if (!loading() && users().length === 0) {
    <app-empty-state
      title="No users found"
      description="Try adjusting filters or create a new staff account."
    />
  } @else {
    <div class="user-list__grid ag-theme-quartz" [class.user-list__grid--loading]="loading()">
      <ag-grid-angular
        style="width: 100%; height: 100%;"
        theme="legacy"
        [rowData]="users()"
        [columnDefs]="columnDefs"
        [defaultColDef]="defaultColDef"
        [context]="gridContext"
        [suppressCellFocus]="true"
        (gridReady)="onGridReady($event)"
        (sortChanged)="onSortChanged($event)"
      />
    </div>

    <app-pagination-bar
      [page]="page()"
      [pageSize]="pageSize()"
      [totalElements]="totalElements()"
      [loading]="loading()"
      itemLabel="users"
      (previous)="prevPage()"
      (next)="nextPage()"
    />
  }
</section>
