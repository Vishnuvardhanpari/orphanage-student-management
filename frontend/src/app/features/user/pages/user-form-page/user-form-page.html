<section class="user-form oms-page">
  <app-page-header
    [title]="isEdit() ? 'Edit user' : 'Add user'"
    [subtitle]="
      isEdit()
        ? 'Update profile and role. Use Reset password from the user details page.'
        : 'Pre-provision a staff or admin account for login.'
    "
  >
    <app-button variant="secondary" [routerLink]="paths.users">Back to list</app-button>
  </app-page-header>

  @if (loading()) {
    <p class="user-form__loading">Loading user…</p>
  } @else {
    <form class="user-form__card" [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <app-field
        label="Username"
        [error]="
          form.controls.username.touched && form.controls.username.invalid
            ? 'Username is required.'
            : ''
        "
      >
        <app-input type="text" formControlName="username" autocomplete="username" />
      </app-field>

      <app-field
        label="Email"
        [error]="
          form.controls.email.touched && form.controls.email.invalid
            ? 'Enter a valid email.'
            : ''
        "
      >
        <app-input type="email" formControlName="email" autocomplete="email" />
      </app-field>

      <app-field label="Role">
        <app-select formControlName="role">
          <option [value]="roles.Staff">Staff</option>
          <option [value]="roles.Admin">Admin</option>
        </app-select>
      </app-field>

      @if (!isEdit()) {
        <app-field label="Auth provider">
          <app-select formControlName="authProvider">
            <option [value]="providers.Local">Local (password)</option>
            <option [value]="providers.Google">Google only</option>
          </app-select>
        </app-field>

        @if (form.controls.authProvider.value === providers.Local) {
          <app-field
            label="Password"
            [error]="
              form.controls.password.touched && form.controls.password.invalid
                ? 'Password must be at least 8 characters.'
                : ''
            "
          >
            <app-input
              type="password"
              formControlName="password"
              autocomplete="new-password"
            />
          </app-field>
        }
      }

      <div class="user-form__actions">
        <app-button type="submit" variant="primary" [disabled]="submitting()">
          {{ submitting() ? 'Saving…' : isEdit() ? 'Save changes' : 'Create user' }}
        </app-button>
      </div>
    </form>
  }
</section>
