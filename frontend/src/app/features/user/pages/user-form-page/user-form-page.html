<section class="user-form">
  <app-page-header
    [title]="isEdit() ? 'Edit user' : 'Add user'"
    [subtitle]="
      isEdit()
        ? 'Update profile and role. Use Reset password from the user details page.'
        : 'Pre-provision a staff or admin account for login.'
    "
  >
    <a [routerLink]="paths.users">
      <app-button variant="secondary">Back to list</app-button>
    </a>
  </app-page-header>

  @if (loading()) {
    <p class="user-form__loading">Loading user…</p>
  } @else {
    <form class="user-form__card" [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <label class="user-form__field">
        <span>Username</span>
        <input class="user-form__input" type="text" formControlName="username" autocomplete="username" />
        @if (form.controls.username.touched && form.controls.username.invalid) {
          <span class="user-form__error">Username is required.</span>
        }
      </label>

      <label class="user-form__field">
        <span>Email</span>
        <input class="user-form__input" type="email" formControlName="email" autocomplete="email" />
        @if (form.controls.email.touched && form.controls.email.invalid) {
          <span class="user-form__error">Enter a valid email.</span>
        }
      </label>

      <label class="user-form__field">
        <span>Role</span>
        <select class="user-form__input" formControlName="role">
          <option [value]="roles.Staff">Staff</option>
          <option [value]="roles.Admin">Admin</option>
        </select>
      </label>

      @if (!isEdit()) {
        <label class="user-form__field">
          <span>Auth provider</span>
          <select class="user-form__input" formControlName="authProvider">
            <option [value]="providers.Local">Local (password)</option>
            <option [value]="providers.Google">Google only</option>
          </select>
        </label>

        @if (form.controls.authProvider.value === providers.Local) {
          <label class="user-form__field">
            <span>Password</span>
            <input
              class="user-form__input"
              type="password"
              formControlName="password"
              autocomplete="new-password"
            />
            @if (form.controls.password.touched && form.controls.password.invalid) {
              <span class="user-form__error">Password must be at least 8 characters.</span>
            }
          </label>
        }
      }

      <div class="user-form__actions">
        <app-button type="submit" variant="primary" [disabled]="submitting()">
          {{ submitting() ? 'Saving…' : isEdit() ? 'Save changes' : 'Create user' }}
        </app-button>
      </div>
    </form>
  }
</section>
