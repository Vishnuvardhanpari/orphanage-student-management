<div class="export-dialog" role="dialog" [attr.aria-label]="data.title">
  <h2 class="export-dialog__title">{{ data.title }}</h2>
  <p class="export-dialog__message">{{ data.message }}</p>

  @if (data.details?.length) {
    <ul class="export-dialog__details">
      @for (line of data.details; track line) {
        <li>{{ line }}</li>
      }
    </ul>
  }

  <div class="export-dialog__actions">
    <app-button type="button" variant="secondary" (pressed)="cancel()">Cancel</app-button>
    <app-button type="button" variant="primary" (pressed)="confirm()">
      {{ data.confirmLabel || 'Generate PDF' }}
    </app-button>
  </div>
</div>
