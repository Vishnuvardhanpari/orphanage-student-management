<section class="audit-list">
  <app-page-header
    title="Audit Logs"
    subtitle="Immutable history of important business operations."
  />

  <form class="audit-list__filters" [formGroup]="filterForm" (ngSubmit)="applyFilters()">
    <label class="audit-list__field">
      <span>Search</span>
      <input
        type="search"
        formControlName="search"
        placeholder="Description or username"
        class="audit-list__input"
      />
    </label>
    <label class="audit-list__field">
      <span>Module</span>
      <select formControlName="module" class="audit-list__input">
        <option value="">All</option>
        @for (m of modules; track m) {
          <option [value]="m">{{ m }}</option>
        }
      </select>
    </label>
    <label class="audit-list__field">
      <span>Action</span>
      <select formControlName="action" class="audit-list__input">
        <option value="">All</option>
        @for (a of actions; track a) {
          <option [value]="a">{{ a }}</option>
        }
      </select>
    </label>
    <label class="audit-list__field">
      <span>Username</span>
      <input
        type="text"
        formControlName="username"
        placeholder="Exact username"
        class="audit-list__input"
      />
    </label>
    <label class="audit-list__field">
      <span>From</span>
      <input type="date" formControlName="from" class="audit-list__input" />
    </label>
    <label class="audit-list__field">
      <span>To</span>
      <input type="date" formControlName="to" class="audit-list__input" />
    </label>
    <div class="audit-list__filter-actions">
      <app-button type="submit" variant="primary" size="sm">Apply</app-button>
      <app-button type="button" variant="secondary" size="sm" (pressed)="clearFilters()">
        Clear
      </app-button>
    </div>
  </form>

  @if (!loading() && loadFailed()) {
    <app-empty-state
      title="Unable to load audit logs"
      description="Something went wrong while loading audit history. Please try again."
    >
      <app-button type="button" variant="primary" size="sm" (pressed)="loadLogs()">
        Retry
      </app-button>
    </app-empty-state>
  } @else if (!loading() && logs().length === 0) {
    <app-empty-state
      title="No audit logs found"
      description="Try adjusting filters, or perform a tracked action such as login."
    />
  } @else {
    <div
      class="audit-list__grid ag-theme-quartz"
      [class.audit-list__grid--loading]="loading()"
    >
      <ag-grid-angular
        style="width: 100%; height: 100%;"
        theme="legacy"
        [rowData]="logs()"
        [columnDefs]="columnDefs"
        [defaultColDef]="defaultColDef"
        [suppressCellFocus]="true"
        [rowStyle]="{ cursor: 'pointer' }"
        (gridReady)="onGridReady($event)"
        (sortChanged)="onSortChanged($event)"
        (rowClicked)="onRowClicked($event.data?.id)"
      />
    </div>

    <div class="audit-list__pager">
      <span class="audit-list__pager-meta">
        {{ totalElements() }} event{{ totalElements() === 1 ? '' : 's' }} · Page
        {{ page() + 1 }}
      </span>
      <div class="audit-list__pager-actions">
        <app-button
          type="button"
          variant="secondary"
          size="sm"
          [disabled]="page() === 0 || loading()"
          (pressed)="prevPage()"
        >
          Previous
        </app-button>
        <app-button
          type="button"
          variant="secondary"
          size="sm"
          [disabled]="(page() + 1) * pageSize() >= totalElements() || loading()"
          (pressed)="nextPage()"
        >
          Next
        </app-button>
      </div>
    </div>
  }
</section>
