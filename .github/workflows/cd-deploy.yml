# Continuous Deployment — Production (Milestone 15)
#
# Prerequisites: complete docs/14_Production_Runbook.md (GCP, Supabase, WIF, LB, secrets).
# Repository Actions variables required — see runbook §10.
#
# Secrets stay in Google Secret Manager (referenced by Cloud Run). Do not add DB/JWT
# secrets to GitHub.

name: CD Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: cd-deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  # Filled from repository variables in jobs below
  IMAGE_NAME: oms-api

jobs:
  backend:
    name: Backend (build, push, Cloud Run)
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${{ vars.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Build and push image
        working-directory: backend
        env:
          AR_HOST: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.AR_REPO }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          IMAGE="${AR_HOST}/${IMAGE_NAME}"
          docker build -t "${IMAGE}:${SHA}" -t "${IMAGE}:latest" .
          docker push "${IMAGE}:${SHA}"
          docker push "${IMAGE}:latest"

      - name: Deploy Cloud Run
        env:
          AR_HOST: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.AR_REPO }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          IMAGE="${AR_HOST}/${IMAGE_NAME}:${SHA}"
          gcloud run deploy "${{ vars.CLOUD_RUN_SERVICE }}" \
            --project="${{ vars.GCP_PROJECT_ID }}" \
            --region="${{ vars.GCP_REGION }}" \
            --platform=managed \
            --image="${IMAGE}" \
            --service-account="${{ vars.GCP_RUNTIME_SA }}" \
            --ingress=internal-and-cloud-load-balancing \
            --allow-unauthenticated \
            --port=8080 \
            --memory=1Gi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=5 \
            --timeout=300 \
            --set-env-vars="SPRING_PROFILES_ACTIVE=prod,DB_HOST=${{ vars.DB_HOST }},DB_PORT=${{ vars.DB_PORT }},DB_NAME=${{ vars.DB_NAME }},DB_USERNAME=${{ vars.DB_USERNAME }},GCS_BUCKET_NAME=${{ vars.DOCS_BUCKET }},OMS_CORS_ALLOWED_ORIGINS=https://${{ vars.OMS_DOMAIN }},GOOGLE_CLIENT_ID=${{ vars.GOOGLE_CLIENT_ID }},JWT_ISSUER=oms,JWT_EXPIRATION=3600000,JWT_REFRESH_EXPIRATION=604800000" \
            --set-secrets="DB_PASSWORD=DB_PASSWORD:latest,JWT_SECRET=JWT_SECRET:latest,OMS_BOOTSTRAP_ADMIN_PASSWORD=OMS_BOOTSTRAP_ADMIN_PASSWORD:latest" \
            --quiet

  frontend:
    name: Frontend (build, GCS)
    runs-on: ubuntu-latest
    needs: [backend]
    environment: production
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Inject Google client ID
        env:
          GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID }}
        run: |
          set -euo pipefail
          # Escape single quotes for safe TypeScript string injection
          ESCAPED=$(printf '%s' "${GOOGLE_CLIENT_ID}" | sed "s/'/\\\\'/g")
          sed -i "s/googleClientId: ''/googleClientId: '${ESCAPED}'/" src/environments/environment.prod.ts
          grep -q "googleClientId: '${ESCAPED}'" src/environments/environment.prod.ts

      - name: Install and build
        run: |
          set -euo pipefail
          npm ci
          npm run build -- --configuration production

      - name: Upload SPA to GCS
        env:
          SPA_BUCKET: ${{ vars.SPA_BUCKET }}
        run: |
          set -euo pipefail
          DIST="dist/oms-frontend/browser"
          if [ ! -d "${DIST}" ]; then
            # Fallback if Angular output layout differs
            DIST="dist/oms-frontend"
          fi
          test -f "${DIST}/index.html"
          # Hashed assets: long cache; HTML: revalidate
          gcloud storage rsync "${DIST}" "gs://${SPA_BUCKET}" --delete-unmatched-destination-objects --recursive
          gcloud storage objects update "gs://${SPA_BUCKET}/index.html" \
            --cache-control="no-cache, max-age=0" || true
          # Best-effort long cache for hashed JS/CSS (ignore if no matches)
          gcloud storage objects update "gs://${SPA_BUCKET}/**/*.js" \
            --cache-control="public, max-age=31536000, immutable" 2>/dev/null || true
          gcloud storage objects update "gs://${SPA_BUCKET}/**/*.css" \
            --cache-control="public, max-age=31536000, immutable" 2>/dev/null || true
