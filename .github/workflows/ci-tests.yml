name: CI Tests

on:
  push:
    branches: [main, 'milestone/**', 'feature/**']
  pull_request:
    branches: [main]

concurrency:
  group: ci-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Maven + JaCoCo)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Run tests with coverage gate
        run: mvn -B verify
      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: backend/target/site/jacoco
          if-no-files-found: ignore

  frontend-unit:
    name: Frontend unit (Karma + coverage)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Unit tests with coverage gate
        run: npm run test:ci

  frontend-e2e:
    name: Frontend E2E (Cypress)
    runs-on: ubuntu-latest
    needs: [backend, frontend-unit]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: oms_dev
          POSTGRES_USER: oms_user
          POSTGRES_PASSWORD: oms_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U oms_user -d oms_dev"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      SPRING_PROFILES_ACTIVE: local
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: oms_dev
      DB_USERNAME: oms_user
      DB_PASSWORD: oms_ci_password
      JWT_SECRET: ci_test_secret_key_at_least_32_characters_long
      JWT_EXPIRATION: 3600000
      JWT_REFRESH_EXPIRATION: 604800000
      JWT_ISSUER: oms
      OMS_BOOTSTRAP_ADMIN_USERNAME: admin
      OMS_BOOTSTRAP_ADMIN_EMAIL: admin@oms.local
      OMS_BOOTSTRAP_ADMIN_PASSWORD: 12345678
      OMS_LOCKOUT_MAX_ATTEMPTS: 5
      OMS_LOCKOUT_DURATION_MINUTES: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Build backend
        working-directory: backend
        run: mvn -B -DskipTests package
      - name: Start backend
        working-directory: backend
        run: |
          nohup java -jar target/oms-0.0.1-SNAPSHOT.jar > /tmp/oms-backend.log 2>&1 &
          echo $! > /tmp/oms-backend.pid
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/actuator/health >/dev/null; then
              echo "Backend healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Backend failed to start"
          cat /tmp/oms-backend.log
          exit 1
      - name: Cypress E2E
        working-directory: frontend
        env:
          TS_NODE_PROJECT: tsconfig.cypress.json
        run: npx start-server-and-test start http://localhost:4200 "npx cypress run"
      - name: Upload Cypress screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: frontend/cypress/screenshots
          if-no-files-found: ignore
      - name: Backend logs on failure
        if: failure()
        run: cat /tmp/oms-backend.log || true
