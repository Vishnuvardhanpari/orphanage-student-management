spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:oms_dev}
    username: ${DB_USERNAME:oms_user}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

oms:
  cors:
    allowed-origins: ${OMS_CORS_ALLOWED_ORIGINS:http://localhost:4200}
  storage:
    type: local
    local:
      base-path: ${OMS_STORAGE_LOCAL_PATH:./storage}

logging:
  level:
    com.orphanage.oms: DEBUG
