spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: never

# Set OMS_CORS_ALLOWED_ORIGINS to the production frontend origin(s), comma-separated.
# Empty default denies browser cross-origin access until configured.
oms:
  cors:
    allowed-origins: ${OMS_CORS_ALLOWED_ORIGINS:}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

logging:
  level:
    com.orphanage.oms: INFO
    root: WARN

server:
  error:
    include-message: never
