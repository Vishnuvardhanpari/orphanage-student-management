spring:
  datasource:
    url: jdbc:h2:mem:oms_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

oms:
  cors:
    allowed-origins: http://localhost:4200
  storage:
    type: local
    local:
      base-path: ${OMS_STORAGE_LOCAL_PATH:./target/test-storage}
  security:
    jwt:
      secret: test-secret-key-must-be-at-least-32-characters-long
      access-token-expiration-ms: 3600000
      refresh-token-expiration-ms: 604800000
      issuer: oms-test
    google:
      client-id: test-google-client-id
    lockout:
      max-failed-attempts: 5
      duration-minutes: 15
    bootstrap:
      admin-username: admin
      admin-email: admin@oms.local
      admin-password: ChangeMeAdmin123!

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.orphanage.oms: INFO
    org.springframework: WARN
