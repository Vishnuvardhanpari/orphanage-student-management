spring:
  application:
    name: oms

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

server:
  port: ${SERVER_PORT:8080}
  error:
    include-stacktrace: never
    include-message: always

management:
  endpoints:
    web:
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
  info:
    env:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    description: Orphanage Management System API
    version: '@project.version@'

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  packages-to-scan: com.orphanage.oms

# Comma-separated browser origins. Profile-specific defaults apply for local/dev.
oms:
  cors:
    allowed-origins: ${OMS_CORS_ALLOWED_ORIGINS:}
  security:
    jwt:
      secret: ${JWT_SECRET:change_me_use_a_long_random_secret_at_least_32_chars}
      access-token-expiration-ms: ${JWT_EXPIRATION:3600000}
      refresh-token-expiration-ms: ${JWT_REFRESH_EXPIRATION:604800000}
      issuer: ${JWT_ISSUER:oms}
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
    lockout:
      max-failed-attempts: ${OMS_LOCKOUT_MAX_ATTEMPTS:5}
      duration-minutes: ${OMS_LOCKOUT_DURATION_MINUTES:15}
    bootstrap:
      admin-username: ${OMS_BOOTSTRAP_ADMIN_USERNAME:admin}
      admin-email: ${OMS_BOOTSTRAP_ADMIN_EMAIL:admin@oms.local}
      admin-password: ${OMS_BOOTSTRAP_ADMIN_PASSWORD:ChangeMeAdmin123!}

logging:
  level:
    root: INFO
